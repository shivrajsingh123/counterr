<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>7 Segment Digital Counter</title>

  <!-- ✅ CSS LINK -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="counter-box">
    <div class="screen">
      <div id="digit">
        <span class="segment a"></span>
        <span class="segment b"></span>
        <span class="segment c"></span>
        <span class="segment d"></span>
        <span class="segment e"></span>
        <span class="segment f"></span>
        <span class="segment g"></span>
      </div>
    </div>

    <div class="controls">
      <button id="dec">-</button>
      <button id="reset">Reset</button>
      <button id="inc">+</button>
      <button id="gf">Shivvi Mode</button>
    </div>
  </div>

  <!-- ✅ JAVASCRIPT LINK (always at bottom) -->
  <script src="script.js"></script>
</body>
</html>
